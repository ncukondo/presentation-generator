# ============================================================================
# slides.yaml — スライドの内容・ナレーション原稿の一元管理ファイル
#
# 各スライドは `id` で識別される。TypeScript 側では getSlide(id) で内容を取得する。
# レイアウト・スタイリングは pages/*.ts に定義されており、ここには純粋なコンテンツのみ記述。
#
# 構造:
#   - id: スライドの一意識別子（pages/*.ts の getSlide() 呼び出しと対応）
#   - title: スライドタイトル
#   - narration: TTS で読み上げるナレーション原稿（省略可）
#   - その他のフィールド: 各スライドのレイアウトに応じたデータ（cards, items, steps 等）
#
# ナレーション修正例:
#   yq '(.slides[] | select(.id == "background")).narration = "新しいナレーション"' -i slides.yaml
# ============================================================================

slides:
  # --------------------------------------------------------------------------
  # タイトルスライド
  # フィールド: title, subtitle, presenter, narration
  # --------------------------------------------------------------------------
  - id: title
    title: |-
      サンプルプレゼンテーション
      タイトルをここに記入
    subtitle: プレゼンテーションのサブタイトル
    presenter: 発表者名・所属・日付などをここに記入
    narration: |
      ここにタイトルスライドのナレーション原稿を記載します。プレゼンテーションの導入として、視聴者への挨拶や概要を述べます。

  # --------------------------------------------------------------------------
  # 背景・課題スライド（3カラムカード型）
  # フィールド: title, subtitle, cards[].{heading, body, detail, cites[]}, narration
  # cites にはパンドック形式の引用キーを指定（lib/cite.ts で解決）
  # --------------------------------------------------------------------------
  - id: background
    title: "背景：テーマを取り巻く現状"
    subtitle: 解決すべき3つの課題
    cards:
      - heading: 課題1のタイトル
        body: 課題1の概要を簡潔に記述
        detail: 具体的なデータや事例を記載
        cites: []
      - heading: 課題2のタイトル
        body: 課題2の概要を簡潔に記述
        detail: 具体的なデータや事例を記載
        cites: []
      - heading: 課題3のタイトル
        body: 課題3の概要を簡潔に記述
        detail: 具体的なデータや事例を記載
        cites: []
    narration: |
      ここに背景説明のナレーション原稿を記載します。3つの課題についてそれぞれ説明を行います。

  # --------------------------------------------------------------------------
  # ツール・手法紹介スライド（2カラム: 特徴一覧 + エビデンス）
  # フィールド: title, subtitle, features[], evidence_heading, evidence[].{heading, body, cite}, figure?, url, narration
  # --------------------------------------------------------------------------
  - id: notebooklm
    title: ツール・手法の紹介
    subtitle: ツール名やアプローチの概要
    features:
      - 特徴1: 主要な機能や利点を記載
      - 特徴2: 他の特徴を記載
      - 特徴3: さらなる特徴を記載
      - 特徴4: 補足情報や注意点
    evidence_heading: 活用事例・エビデンス
    # figure: figure.png          # assets/ 内の補足画像（省略可）
    # figure_cite: ""              # 補足画像の引用キー（省略可）
    evidence:
      - heading: 活用事例1
        body: 事例の概要を記載
        cite: ""
      - heading: 活用事例2
        body: 事例の概要を記載
        cite: ""
      - heading: 活用事例3
        body: 事例の概要を記載
        cite: ""
    url: example.com
    narration: |
      ここにツール・手法紹介のナレーション原稿を記載します。

  # --------------------------------------------------------------------------
  # ステップ概要スライド（7ステップの一覧表示）
  # フィールド: title, subtitle, steps[], note, narration
  # --------------------------------------------------------------------------
  - id: steps-overview
    title: ワークフローの全体像
    subtitle: 実践する流れ
    steps:
      - ステップ1のタイトル
      - ステップ2のタイトル
      - ステップ3のタイトル
      - ステップ4のタイトル
      - ステップ5のタイトル
      - ステップ6のタイトル
      - ステップ7のタイトル
    note: ※ 各ステップの詳細は次のスライドで説明します
    narration: |
      ここにステップ概要のナレーション原稿を記載します。

  # --------------------------------------------------------------------------
  # 各ステップ詳細スライド（スクリーンショット付き）
  # フィールド: title, screenshot, note, narration
  # screenshot は screenshots/ ディレクトリ内のファイル名を指定
  # --------------------------------------------------------------------------
  - id: step-1
    title: ステップ1のタイトル
    screenshot: step-01.png
    note: "ステップ1の補足説明"
    narration: |
      ステップ1のナレーション原稿をここに記載します。

  - id: step-2
    title: ステップ2のタイトル
    screenshot: step-02.png
    note: ステップ2の補足説明
    narration: |
      ステップ2のナレーション原稿をここに記載します。

  - id: step-3
    title: ステップ3のタイトル
    screenshot: step-03.png
    note: ステップ3の補足説明
    narration: |
      ステップ3のナレーション原稿をここに記載します。

  - id: step-4
    title: ステップ4のタイトル
    screenshot: step-04.png
    note: ステップ4の補足説明
    narration: |
      ステップ4のナレーション原稿をここに記載します。

  - id: step-5
    title: ステップ5のタイトル
    screenshot: step-05.png
    note: ステップ5の補足説明
    narration: |
      ステップ5のナレーション原稿をここに記載します。

  - id: step-6
    title: ステップ6のタイトル
    screenshot: step-06.png
    note: ステップ6の補足説明
    narration: |
      ステップ6のナレーション原稿をここに記載します。

  - id: step-7
    title: ステップ7のタイトル
    screenshot: step-07.png
    note: ステップ7の補足説明
    narration: |
      ステップ7のナレーション原稿をここに記載します。

  # --------------------------------------------------------------------------
  # リスクと品質管理スライド（2カラム: リスク + 対策）
  # フィールド: title, risks_heading, risks[], solutions_heading, solutions[], banner, narration
  # --------------------------------------------------------------------------
  - id: risks
    title: リスクと品質管理
    risks_heading: 留意すべきリスク
    risks:
      - heading: リスク1のタイトル
        body: リスク1の説明
        cites: []
      - heading: リスク2のタイトル
        body: リスク2の説明
        cites: []
    solutions_heading: 対策のポイント
    solutions:
      - heading: 対策1のタイトル
        body: 対策1の説明
      - heading: 対策2のタイトル
        body: 対策2の説明
        cites: []
    banner: 重要なメッセージをここに記載
    narration: |
      ここにリスクと品質管理のナレーション原稿を記載します。

  # --------------------------------------------------------------------------
  # 事前準備スライド（2x2 カード型チェックリスト）
  # フィールド: title, subtitle, items[].{title, desc, url?, warning?}, narration
  # --------------------------------------------------------------------------
  - id: preparation
    title: 事前準備のお願い
    subtitle: 事前にご準備ください
    items:
      - title: 準備項目1
        desc: 準備項目1の説明
      - title: 準備項目2
        desc: 準備項目2の説明
        url: "https://example.com/"
      - title: 準備項目3
        desc: 準備項目3の説明
      - title: 準備項目4
        desc: 準備項目4の説明
        warning: 注意事項があればここに記載
    narration: |
      ここに事前準備のナレーション原稿を記載します。

  # --------------------------------------------------------------------------
  # クロージングスライド（タイムライン + 締めメッセージ）
  # フィールド: title, timeline[].{time, duration, desc}, closing_message, closing_sub, conference, narration
  # --------------------------------------------------------------------------
  - id: closing
    title: 当日の流れ
    timeline:
      - time: パート1
        duration: 10分
        desc: パート1の内容説明
      - time: パート2
        duration: 35分
        desc: パート2の内容説明
      - time: パート3
        duration: 15分
        desc: パート3の内容説明
    closing_message: |-
      締めのメッセージをここに記載
    closing_sub: 補足メッセージ
    conference: イベント名・日付をここに記入
    narration: |
      ここにクロージングのナレーション原稿を記載します。

  # --------------------------------------------------------------------------
  # 文献一覧スライド（自動生成 — cite() で参照された文献が一覧表示される）
  # --------------------------------------------------------------------------
  - id: references
    title: References
